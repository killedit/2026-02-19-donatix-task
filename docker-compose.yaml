services:
  laravel:
    build:
      context: .
      dockerfile: ./Dockerfile
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
      # - ./entrypoint.sh:/usr/local/bin/entrypoint.sh:ro
    restart: unless-stopped
    working_dir: /var/www/html
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - donatix_net
    entrypoint: ["/usr/local/bin/entrypoint.sh"]

  nginx:
    image: nginx:alpine
    ports:
      - "8010:80"
    volumes:
      - .:/var/www/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel
    networks:
      - donatix_net

  mysql:
    image: mysql:8
    restart: unless-stopped
    volumes:
      - mysql_data:/var/lib/mysql
    env_file:
      - .env
    ports:
      - "3310:3306"
    networks:
      - donatix_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  donatix_net:

volumes:
  mysql_data:
